name: Preview newsletter announcement (dry-run)

# Throwaway workflow used to count CIAM members eligible for the
# newsletter-opt-in announcement, without sending anything. Safe to leave
# in place — it has no email path and never writes any PII to logs.
#
# Trigger: workflow_dispatch (manual) only.

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    preview:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Acquire Microsoft Graph token (CIAM client credentials)
              id: graph
              run: |
                  RESPONSE=$(curl -s -X POST \
                    "https://login.microsoftonline.com/${{ secrets.CIAM_TENANT_ID }}/oauth2/v2.0/token" \
                    -H "Content-Type: application/x-www-form-urlencoded" \
                    --data-urlencode "client_id=${{ secrets.CIAM_CLIENT_ID }}" \
                    --data-urlencode "client_secret=${{ secrets.CIAM_CLIENT_SECRET }}" \
                    --data-urlencode "scope=https://graph.microsoft.com/.default" \
                    --data-urlencode "grant_type=client_credentials")
                  TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
                  if [ -z "$TOKEN" ]; then
                    echo "ERROR: Graph token acquisition failed"
                    echo "$RESPONSE" | jq '.'
                    exit 1
                  fi
                  echo "::add-mask::$TOKEN"
                  echo "token=$TOKEN" >> $GITHUB_OUTPUT

            - name: Page through CIAM users and tally
              env:
                  TOKEN: ${{ steps.graph.outputs.token }}
                  EXT_APP_ID: ${{ vars.EXT_APP_ID }}
              run: |
                  OPTIN_PROP="extension_${EXT_APP_ID}_marketingOptInAt"
                  SELECT="id,givenName,mail,${OPTIN_PROP}"
                  URL="https://graph.microsoft.com/v1.0/users?\$select=${SELECT}&\$top=100"

                  TOTAL=0
                  WITH_EMAIL=0
                  OPTED_IN=0
                  CANDIDATES=0
                  HAS_GIVEN_NAME=0

                  while [ -n "$URL" ]; do
                    RESPONSE=$(curl -s -H "Authorization: Bearer $TOKEN" "$URL")
                    if echo "$RESPONSE" | jq -e '.error' >/dev/null 2>&1; then
                      echo "ERROR: Graph users query failed"
                      echo "$RESPONSE" | jq '.error'
                      exit 1
                    fi
                    BATCH_TOTAL=$(echo "$RESPONSE" | jq '.value | length')
                    BATCH_WITH_EMAIL=$(echo "$RESPONSE" | jq '[.value[] | select(.mail != null)] | length')
                    BATCH_OPTED_IN=$(echo "$RESPONSE" | jq --arg p "$OPTIN_PROP" '[.value[] | select(.mail != null) | select(.[$p] != null)] | length')
                    BATCH_CANDIDATES=$(echo "$RESPONSE" | jq --arg p "$OPTIN_PROP" '[.value[] | select(.mail != null) | select(.[$p] == null)] | length')
                    BATCH_GIVEN_NAME=$(echo "$RESPONSE" | jq --arg p "$OPTIN_PROP" '[.value[] | select(.mail != null) | select(.[$p] == null) | select(.givenName != null)] | length')

                    TOTAL=$((TOTAL + BATCH_TOTAL))
                    WITH_EMAIL=$((WITH_EMAIL + BATCH_WITH_EMAIL))
                    OPTED_IN=$((OPTED_IN + BATCH_OPTED_IN))
                    CANDIDATES=$((CANDIDATES + BATCH_CANDIDATES))
                    HAS_GIVEN_NAME=$((HAS_GIVEN_NAME + BATCH_GIVEN_NAME))

                    URL=$(echo "$RESPONSE" | jq -r '."@odata.nextLink" // empty')
                  done

                  WITHOUT_EMAIL=$((TOTAL - WITH_EMAIL))
                  PERSONALIZED_PCT=0
                  if [ "$CANDIDATES" -gt 0 ]; then
                    PERSONALIZED_PCT=$((HAS_GIVEN_NAME * 100 / CANDIDATES))
                  fi

                  echo "## Newsletter announcement dry-run preview" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Counts only — no email addresses or names are emitted." >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Bucket | Count |" >> $GITHUB_STEP_SUMMARY
                  echo "|---|---|" >> $GITHUB_STEP_SUMMARY
                  echo "| CIAM users total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
                  echo "| Without primary email (skipped) | $WITHOUT_EMAIL |" >> $GITHUB_STEP_SUMMARY
                  echo "| With email | $WITH_EMAIL |" >> $GITHUB_STEP_SUMMARY
                  echo "| Already opted in (skipped) | $OPTED_IN |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Candidates for announcement** | **$CANDIDATES** |" >> $GITHUB_STEP_SUMMARY
                  echo "| Of which personalised by first name | $HAS_GIVEN_NAME (${PERSONALIZED_PCT}%) |" >> $GITHUB_STEP_SUMMARY

                  echo ""
                  echo "RESULTS:"
                  echo "  CIAM users total: $TOTAL"
                  echo "  Without email:    $WITHOUT_EMAIL"
                  echo "  With email:       $WITH_EMAIL"
                  echo "  Opted in:         $OPTED_IN"
                  echo "  Candidates:       $CANDIDATES"
                  echo "  Personalised:     $HAS_GIVEN_NAME / $CANDIDATES (${PERSONALIZED_PCT}%)"
